name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Create project and copy files
        run: |
          flutter create noxvus_build
          cp -r lib/* noxvus_build/lib/
          cp pubspec.yaml noxvus_build/pubspec.yaml

      - name: Fix Gradle version
        run: |
          sed -i "s|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.9-all.zip|" noxvus_build/android/gradle/wrapper/gradle-wrapper.properties
          sed -i 's/id("org.jetbrains.kotlin.android") version "[^"]*"/id("org.jetbrains.kotlin.android") version "1.9.22"/' noxvus_build/android/settings.gradle.kts

      - name: Install dependencies
        run: cd noxvus_build && flutter pub get

      - name: Build APK
        run: cd noxvus_build && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: noxvus-apk
          path: noxvus_build/build/app/outputs/flutter-apk/app-release.apk
