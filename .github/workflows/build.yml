name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Create project and copy files
        run: |
          flutter create noxvus_build
          cp -r lib/* noxvus_build/lib/
          cp pubspec.yaml noxvus_build/pubspec.yaml

      - name: Fix Kotlin version
        run: |
          cd noxvus_build/android
          sed -i "s/ext.kotlin_version = .*/ext.kotlin_version = '1.9.22'/" build.gradle
          cat build.gradle

      - name: Fix Gradle wrapper
        run: |
          cd noxvus_build/android
          sed -i "s|distributionUrl=.*|distributionUrl=https\://services.gradle.org/distributions/gradle-8.4-bin.zip|" gradle/wrapper/gradle-wrapper.properties
          cat gradle/wrapper/gradle-wrapper.properties

      - name: Install dependencies
        run: cd noxvus_build && flutter pub get

      - name: Build APK
        run: cd noxvus_build && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: noxvus-apk
          path: noxvus_build/build/app/outputs/flutter-apk/app-release.apk
