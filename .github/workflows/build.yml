name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create fresh Flutter project
        run: |
          flutter create noxvus_build
          cp -r lib/* noxvus_build/lib/
          cp pubspec.yaml noxvus_build/pubspec.yaml

      - name: Install dependencies
        run: |
          cd noxvus_build
          flutter pub get

      - name: Build APK
        run: |
          cd noxvus_build
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: noxvus-apk
          path: noxvus_build/build/app/outputs/flutter-apk/app-release.apk
          name: noxvus-apk
          path: build/app/outputs/flutter-apk/app-release.apk
