name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create project and copy files
        run: |
          flutter create noxvus_build
          cp -r lib/* noxvus_build/lib/
          cp pubspec.yaml noxvus_build/pubspec.yaml

      - name: Fix Kotlin and Gradle version
        run: |
          cat > noxvus_build/android/build.gradle << 'GRADLE'
          buildscript {
              ext.kotlin_version = '1.9.22'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "${rootProject.buildDir}/${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }
          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          GRADLE

      - name: Install dependencies
        run: cd noxvus_build && flutter pub get

      - name: Build APK
        run: cd noxvus_build && flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: noxvus-apk
          path: noxvus_build/build/app/outputs/flutter-apk/app-release.apk
